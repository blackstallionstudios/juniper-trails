<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Juniper Trails Bed &amp; Breakfast — Williams Lake, BC</title>
    <meta
      name="description"
      content="A three-room bed &amp; breakfast on 27 acres ten minutes from Williams Lake, BC. Homemade breakfasts, trails, and welcoming hosts in the heart of the Cariboo."
    />
    <link rel="canonical" href="https://junipertrails.ca/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Juniper Trails Bed &amp; Breakfast — Williams Lake, BC"
    />
    <meta
      property="og:description"
      content="A quiet three-room B&amp;B on 27 acres in the Cariboo. Homemade breakfasts, trails, and hosts who want you here."
    />
    <meta property="og:locale" content="en_CA" />
    <meta property="og:url" content="https://junipertrails.ca/" />
    <meta property="og:image" content="https://junipertrails.ca/favicon-512.png" />

    <!-- Fonts: Cormorant Garamond (display) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />

    <!-- Brand logo: green juniper-tree mark, cropped from the full lockup -->
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#85a20a" />

    <!-- Styles linked as a real stylesheet (not JS-injected) so the first
         paint is already styled — fixes the dev FOUC. -->
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    {{> nav}} {{> spine}} {{> hero}}

    <main>
      {{> hosts}} {{> rooms}} {{> breakfast}} {{> artwork}} {{> trails}} {{> testimonials}} {{> contact}}
    </main>

    {{> footer}}

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
